name: Build Markdown Paper

on:
  workflow_dispatch:
    inputs:
      mode:
        description: 'Build mode: "review" outputs to /review/, "publish" outputs to /publish/'
        required: true
        default: review
        type: choice
        options:
          - review
          - publish

jobs:
  build:
    name: Convert paper.md → HTML & PDF
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install Pandoc and LaTeX (for PDF)
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y pandoc texlive-latex-base texlive-fonts-recommended \
            texlive-latex-recommended texlive-xetex

      - name: Set output directory
        id: vars
        run: |
          if [ "${{ github.event.inputs.mode }}" = "publish" ]; then
            echo "output_dir=publish" >> "$GITHUB_OUTPUT"
          else
            echo "output_dir=review" >> "$GITHUB_OUTPUT"
          fi

      - name: Convert paper.md to HTML
        run: |
          pandoc paper/paper.md \
            --standalone \
            -o ${{ steps.vars.outputs.output_dir }}/paper.html

      - name: Convert paper.md to PDF
        run: |
          pandoc paper/paper.md \
            --standalone \
            --pdf-engine=xelatex \
            -o ${{ steps.vars.outputs.output_dir }}/paper.pdf

      - name: Commit and push generated files
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add ${{ steps.vars.outputs.output_dir }}/paper.html \
                  ${{ steps.vars.outputs.output_dir }}/paper.pdf
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "ci: build paper in ${{ steps.vars.outputs.output_dir }} mode [skip ci]"
            git push
          fi
